{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vanger_Task</title>
	
	<!-- Bootstrap 5 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Slick Slider CSS -->
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
	<!-- Стили для слайдера -->
	<link rel="stylesheet" href="{% static '/css/style.css' %}">

	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
	<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js" defer></script>
	<script src= "{% static '/js/script.js' %}" defer></script>
</head>

<!-- ============================== sliders -->
<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-4">Галерея слайдера</h1>

    <!-- Основной слайдер -->
    <div class="slider-for">
			{% for item in images %}
				<div>
					<img src="{{ item.image.url }}"  alt="{{ item.title }}"  data-index="{{ forloop.counter0 }}" class="img-fluid slider-main-image">
				</div>
			{% empty %}
				<div class="text-center text-muted py-5">
					<p>Изображения не добавлены</p>
				</div>
			{% endfor %}
    </div>
    
    <!-- Навигационный слайдер -->
    {% if images %}
    <div class="slider-nav">
			{% for item in images %}
				<div>
					<img src="{{ item.image.url }}" alt="{{ item.title }}">
				</div>
			{% endfor %}
    </div>
    {% endif %}
  </div> <!-- class="container py-5" -->
	

	<!-- ============================== Lightbox галерея -->
	<div class="lightbox" id="lightbox">
		<span class="lightbox-close">&times;</span>
		<span class="lightbox-nav lightbox-prev">&#10094;</span>
		<img src="" alt="" id="lightbox-img">
		<span class="lightbox-nav lightbox-next">&#10095;</span>
	</div>

</body> 
</html>
